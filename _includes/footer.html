<footer class="site-footer h-card">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .social-icon, .social-icon:visited {
      margin-left: 0.4em;
      font-size: 1.2em;
      color: inherit;
      text-decoration: none;
    }
    .social-icon:hover {
      opacity: 0.7;
    }
  </style>
  <div class="wrapper">
    <div class="footer-col-wrapper">
      <p class="footer-heading">
        {{ site.author }}
      </p>
      <p>
        {{ site.email }}
        <a class="social-icon" href="https://scholar.google.co.jp/citations?user={{ site.googlescholar_username }}">
          <i class="fas fa-graduation-cap"></i>
        </a>
        <a class="social-icon" href="https://orcid.org/{{ site.orcid_username }}">
          <i class="fa-brands fa-orcid"></i>
        </a>
        <a class="social-icon" href="https://x.com/{{ site.x_username }}">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
      </p>
    </div>
  </div>
</footer>
